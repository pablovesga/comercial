<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentaciones — Juan Pablo Vesga</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f5f7fc; --bg2: #ffffff; --bg3: #eaeff8;
      --ink:     #0d1226; --ink2: #455073; --ink3: #8892b0;
      --accent:  oklch(48% 0.22 240);
      --border:  rgba(0,0,0,0.06); --border2: rgba(0,0,0,0.11);
      --shadow:  0 2px 16px rgba(0,0,0,0.07);
      --nav-bg:  rgba(245,247,252,0.94);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }

    nav {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 3rem; height:64px;
      background:var(--nav-bg);
      backdrop-filter:blur(16px) saturate(180%);
      border-bottom:1px solid var(--border2);
    }
    .nav-logo { font-size:0.82rem; font-weight:600; letter-spacing:0.04em; font-family:'DM Mono',monospace; }
    .nav-logo em { font-style:normal; color:var(--accent); }
    nav ul { list-style:none; display:flex; align-items:center; gap:2rem; }
    nav ul a { font-size:0.8rem; font-weight:500; color:var(--ink2); letter-spacing:0.02em; transition:color 0.2s; }
    nav ul a:hover { color:var(--ink); }
    nav ul a.active-page { color:var(--accent); }
    .nav-cta {
      display:inline-flex; align-items:center; gap:0.4rem;
      background:var(--accent); color:#fff !important;
      padding:0.45rem 1.1rem; border-radius:4px;
      font-size:0.78rem !important; font-weight:600 !important; transition:opacity 0.2s !important;
    }
    .nav-cta:hover { opacity:0.82 !important; }

    .page { max-width:1200px; margin:0 auto; padding:4rem 3rem; }
    .back-link {
      display:inline-flex; align-items:center; gap:0.4rem;
      color:var(--ink3); font-size:0.8rem; margin-bottom:2.5rem;
      font-family:'DM Mono',monospace; transition:color 0.2s;
    }
    .back-link:hover { color:var(--accent); }

    .page-header {
      display:flex; justify-content:space-between; align-items:flex-end;
      gap:2rem; flex-wrap:wrap;
      padding-bottom:2.5rem; margin-bottom:2.5rem;
      border-bottom:1px solid var(--border2);
    }
    .page-header h1 { font-size:clamp(2.2rem,4vw,3.5rem); font-weight:700; letter-spacing:-0.03em; line-height:1; }
    .page-header h1 em { font-style:normal; color:var(--accent); }
    .page-header p { color:var(--ink2); font-size:0.9rem; max-width:300px; text-align:right; }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1.25rem; }

    .deck-card {
      background:var(--bg2); border:1px solid var(--border2);
      border-radius:10px; overflow:hidden;
      transition:border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      color:inherit; display:flex; flex-direction:column;
    }
    .deck-card:hover { border-color:var(--accent); box-shadow:var(--shadow); transform:translateY(-2px); }

    .deck-thumb {
      height:180px; position:relative; overflow:hidden;
      background:var(--bg3);
      display:flex; align-items:center; justify-content:center;
      border-bottom:1px solid var(--border2);
    }
    .deck-thumb-inner {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:0.5rem;
    }
    .deck-thumb-label {
      font-size:0.65rem; font-family:'DM Mono',monospace;
      color:var(--ink3); letter-spacing:0.06em;
    }
    /* Striped placeholder pattern */
    .thumb-placeholder {
      width:100%; height:100%;
      background: repeating-linear-gradient(
        -45deg, var(--border) 0px, var(--border) 1px,
        transparent 1px, transparent 14px
      );
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:0.5rem;
    }

    .deck-body { padding:1.5rem; flex:1; display:flex; flex-direction:column; gap:0.5rem; }
    .deck-title { font-size:0.98rem; font-weight:700; line-height:1.35; }
    .deck-desc { color:var(--ink2); font-size:0.82rem; line-height:1.6; flex:1; }
    .deck-footer {
      padding:0.75rem 1.5rem; border-top:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .deck-date { font-size:0.7rem; color:var(--ink3); font-family:'DM Mono',monospace; }
    .deck-cta { font-size:0.78rem; font-weight:600; color:var(--ink3); font-family:'DM Mono',monospace; transition:color 0.2s; }
    .deck-card:hover .deck-cta { color:var(--accent); }

    /* Empty state */
    .empty-state {
      grid-column:1/-1;
      background:var(--bg2); border:1px dashed var(--border2);
      border-radius:10px; padding:4rem;
      text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem;
    }
    .empty-icon { font-size:2.5rem; opacity:0.4; }
    .empty-title { font-size:1rem; font-weight:600; color:var(--ink2); }
    .empty-sub { font-size:0.82rem; color:var(--ink3); font-family:'DM Mono',monospace; }

    footer {
      border-top:1px solid var(--border2);
      max-width:1200px; margin:5rem auto 0; padding:1.75rem 3rem;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;
    }
    .footer-copy { font-size:0.72rem; color:var(--ink3); font-family:'DM Mono',monospace; }
    .footer-links { display:flex; gap:1.5rem; }
    .footer-links a { font-size:0.72rem; color:var(--ink3); font-family:'DM Mono',monospace; transition:color 0.2s; }
    .footer-links a:hover { color:var(--accent); }

    @media (max-width:768px) {
      nav { padding:0 1.25rem; }
      .page { padding:2rem 1.5rem; }
      .page-header { flex-direction:column; align-items:flex-start; }
      .page-header p { text-align:left; }
      .grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">JPV<em>.</em>comercial</div>
  <ul>
    <li><a href="../hoja-de-vida/">Hoja de Vida</a></li>
    <li><a href="../propuestas/">Propuestas</a></li>
    <li><a href="./" class="active-page">Presentaciones</a></li>
    <li><a href="mailto:pablovesga@outlook.com" class="nav-cta">Contactar →</a></li>
  </ul>
</nav>

<div class="page">
  <a href="../" class="back-link">← Inicio</a>

  <div class="page-header">
    <h1>Presenta<em>ciones</em></h1>
    <p>Decks interactivos para demos, pitches y reuniones de negocio.</p>
  </div>

  <div class="grid" id="grid">
    <div class="empty-state">
      <div class="empty-icon">🎯</div>
      <div class="empty-title">Cargando presentaciones…</div>
      <div class="empty-sub">// buscando index.json</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2026 Juan Pablo Vesga Rosas · Bogotá D.C., Colombia</div>
  <div class="footer-links">
    <a href="https://github.com/pablovesga" target="_blank">GitHub</a>
    <a href="https://app.mempresa.com" target="_blank">mEmpresa</a>
    <a href="mailto:pablovesga@outlook.com">Email</a>
  </div>
</footer>

<script>
  async function init() {
    const grid = document.getElementById('grid');
    try {
      const r = await fetch('index.json');
      if (!r.ok) throw new Error();
      const data = await r.json();
      if (!data.presentaciones?.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📂</div>
            <div class="empty-title">Aún no hay presentaciones</div>
            <div class="empty-sub">// agrega carpetas en presentaciones/ con su meta.json</div>
          </div>`;
        return;
      }
      grid.innerHTML = data.presentaciones.map(p => `
        <a href="${p.slug}/" class="deck-card">
          <div class="deck-thumb">
            <div class="thumb-placeholder">
              <div style="font-size:2rem;opacity:0.35">${p.icon || '🎯'}</div>
              <div class="deck-thumb-label">// preview</div>
            </div>
          </div>
          <div class="deck-body">
            <div class="deck-title">${p.titulo}</div>
            ${p.descripcion ? `<div class="deck-desc">${p.descripcion}</div>` : ''}
          </div>
          <div class="deck-footer">
            <span class="deck-date">${p.fecha}</span>
            <span class="deck-cta">Ver deck →</span>
          </div>
        </a>
      `).join('');
    } catch {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <div class="empty-title">No hay presentaciones disponibles</div>
          <div class="empty-sub">// agrega carpetas en presentaciones/ con su meta.json</div>
        </div>`;
    }
  }
  init();
</script>
</body>
</html>
