<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propuestas Comerciales — Juan Pablo Vesga</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f5f7fc; --bg2: #ffffff; --bg3: #eaeff8;
      --ink:     #0d1226; --ink2: #455073; --ink3: #8892b0;
      --accent:  oklch(48% 0.22 240);
      --border:  rgba(0,0,0,0.06); --border2: rgba(0,0,0,0.11);
      --shadow:  0 2px 16px rgba(0,0,0,0.07);
      --nav-bg:  rgba(245,247,252,0.94);
      --green:   oklch(52% 0.18 145);
      --amber:   oklch(58% 0.18 60);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }

    /* NAV */
    nav {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 3rem; height:64px;
      background:var(--nav-bg);
      backdrop-filter:blur(16px) saturate(180%);
      border-bottom:1px solid var(--border2);
    }
    .nav-logo { font-size:0.82rem; font-weight:600; letter-spacing:0.04em; font-family:'DM Mono',monospace; }
    .nav-logo em { font-style:normal; color:var(--accent); }
    nav ul { list-style:none; display:flex; align-items:center; gap:2rem; }
    nav ul a { font-size:0.8rem; font-weight:500; color:var(--ink2); letter-spacing:0.02em; transition:color 0.2s; }
    nav ul a:hover { color:var(--ink); }
    nav ul a.active-page { color:var(--accent); }
    .nav-cta {
      display:inline-flex; align-items:center; gap:0.4rem;
      background:var(--accent); color:#fff !important;
      padding:0.45rem 1.1rem; border-radius:4px;
      font-size:0.78rem !important; font-weight:600 !important; transition:opacity 0.2s !important;
    }
    .nav-cta:hover { opacity:0.82 !important; }

    /* PAGE */
    .page { max-width:1200px; margin:0 auto; padding:4rem 3rem; }
    .back-link {
      display:inline-flex; align-items:center; gap:0.4rem;
      color:var(--ink3); font-size:0.8rem; margin-bottom:2.5rem;
      font-family:'DM Mono',monospace; transition:color 0.2s;
    }
    .back-link:hover { color:var(--accent); }

    /* HEADER */
    .page-header {
      display:flex; justify-content:space-between; align-items:flex-end;
      gap:2rem; flex-wrap:wrap;
      padding-bottom:2.5rem; margin-bottom:2.5rem;
      border-bottom:1px solid var(--border2);
    }
    .page-header h1 { font-size:clamp(2.2rem,4vw,3.5rem); font-weight:700; letter-spacing:-0.03em; line-height:1; }
    .page-header h1 em { font-style:normal; color:var(--accent); }
    .page-header p { color:var(--ink2); font-size:0.9rem; max-width:300px; text-align:right; }
    .count-badge {
      font-size:0.7rem; font-family:'DM Mono',monospace;
      background:var(--bg3); border:1px solid var(--border2);
      color:var(--ink3); padding:0.25rem 0.7rem; border-radius:100px;
      margin-left:1rem;
    }

    /* FILTERS */
    .filters { display:flex; gap:0.4rem; margin-bottom:2.5rem; flex-wrap:wrap; }
    .filter-btn {
      padding:0.4rem 1rem; font-size:0.75rem; font-weight:600;
      cursor:pointer; border:1px solid var(--border2);
      background:var(--bg2); color:var(--ink2);
      border-radius:100px; transition:all 0.2s;
      font-family:'DM Mono',monospace; letter-spacing:0.02em;
    }
    .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
    .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1px; background:var(--border2); border:1px solid var(--border2); border-radius:12px; overflow:hidden; }
    .prop-card {
      background:var(--bg2); padding:2rem;
      display:flex; flex-direction:column; gap:0.75rem;
      color:inherit; transition:background 0.2s; position:relative; overflow:hidden;
    }
    .prop-card:hover { background:var(--bg3); }
    .prop-card::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:100px; height:100px; border-radius:50%;
      background:var(--accent); opacity:0; filter:blur(40px);
      transition:opacity 0.3s; pointer-events:none;
    }
    .prop-card:hover::before { opacity:0.08; }
    .prop-top { display:flex; justify-content:space-between; align-items:flex-start; gap:0.75rem; }
    .prop-card h3 { font-size:0.98rem; font-weight:700; line-height:1.35; flex:1; }
    .prop-meta { color:var(--ink3); font-size:0.72rem; font-family:'DM Mono',monospace; }
    .prop-desc { color:var(--ink2); font-size:0.83rem; line-height:1.65; }
    .prop-footer { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:0.75rem; border-top:1px solid var(--border); }
    .ver-link { font-size:0.78rem; font-weight:600; color:var(--ink3); font-family:'DM Mono',monospace; transition:color 0.2s; }
    .prop-card:hover .ver-link { color:var(--accent); }

    .badge-status {
      display:inline-block; font-size:0.65rem; font-weight:600;
      padding:0.2rem 0.6rem; border-radius:100px;
      letter-spacing:0.04em; text-transform:uppercase; white-space:nowrap;
    }
    .badge-status.activa  { background:oklch(52% 0.18 145 / 0.1);  color:var(--green); border:1px solid oklch(52% 0.18 145 / 0.25); }
    .badge-status.enviada { background:oklch(48% 0.22 240 / 0.08); color:var(--accent); border:1px solid oklch(48% 0.22 240 / 0.2); }
    .badge-status.cerrada { background:var(--bg3); color:var(--ink3); border:1px solid var(--border2); }
    .badge-status.ganada  { background:oklch(58% 0.18 60 / 0.1);  color:var(--amber); border:1px solid oklch(58% 0.18 60 / 0.25); }

    .empty {
      grid-column:1/-1; padding:4rem; text-align:center;
      color:var(--ink3); font-size:0.85rem; font-family:'DM Mono',monospace;
    }

    footer {
      border-top:1px solid var(--border2);
      max-width:1200px; margin:5rem auto 0; padding:1.75rem 3rem;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;
    }
    .footer-copy { font-size:0.72rem; color:var(--ink3); font-family:'DM Mono',monospace; }
    .footer-links { display:flex; gap:1.5rem; }
    .footer-links a { font-size:0.72rem; color:var(--ink3); font-family:'DM Mono',monospace; transition:color 0.2s; }
    .footer-links a:hover { color:var(--accent); }

    @media (max-width:768px) {
      nav { padding:0 1.25rem; }
      .page { padding:2rem 1.5rem; }
      .page-header { flex-direction:column; align-items:flex-start; }
      .page-header p { text-align:left; }
      .grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">JPV<em>.</em>comercial</div>
  <ul>
    <li><a href="../hoja-de-vida/">Hoja de Vida</a></li>
    <li><a href="./" class="active-page">Propuestas</a></li>
    <li><a href="../presentaciones/">Presentaciones</a></li>
    <li><a href="mailto:pablovesga@outlook.com" class="nav-cta">Contactar →</a></li>
  </ul>
</nav>

<div class="page">
  <a href="../" class="back-link">← Inicio</a>

  <div class="page-header">
    <h1>Propuestas<br><em>comerciales</em> <span class="count-badge" id="count-badge">—</span></h1>
    <p>Propuestas técnicas y económicas para clientes y socios estratégicos.</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todas</button>
    <button class="filter-btn" data-filter="activa">Activas</button>
    <button class="filter-btn" data-filter="enviada">Enviadas</button>
    <button class="filter-btn" data-filter="ganada">Ganadas</button>
    <button class="filter-btn" data-filter="cerrada">Cerradas</button>
  </div>

  <div class="grid" id="grid">
    <div class="empty">Cargando propuestas…</div>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2026 Juan Pablo Vesga Rosas · Bogotá D.C., Colombia</div>
  <div class="footer-links">
    <a href="https://github.com/pablovesga" target="_blank">GitHub</a>
    <a href="https://app.mempresa.com" target="_blank">mEmpresa</a>
    <a href="mailto:pablovesga@outlook.com">Email</a>
  </div>
</footer>

<script>
  let allPropuestas = [];

  async function init() {
    try {
      const r = await fetch('index.json');
      if (r.ok) {
        const data = await r.json();
        allPropuestas = data.propuestas || [];
        document.getElementById('count-badge').textContent = allPropuestas.length;
        render('all');
      } else {
        document.getElementById('grid').innerHTML = '<div class="empty">No hay propuestas cargadas aún.</div>';
      }
    } catch {
      document.getElementById('grid').innerHTML = '<div class="empty">No se pudo cargar el índice.</div>';
    }
  }

  function render(filter) {
    const grid = document.getElementById('grid');
    const items = filter === 'all' ? allPropuestas : allPropuestas.filter(p => p.estado === filter);
    if (!items.length) { grid.innerHTML = '<div class="empty">No hay propuestas en esta categoría.</div>'; return; }
    grid.innerHTML = items.map(p => `
      <a href="${p.slug}/" class="prop-card">
        <div class="prop-top">
          <h3>${p.titulo}</h3>
          <span class="badge-status ${p.estado}">${p.estado}</span>
        </div>
        <div class="prop-meta">${p.cliente} · ${p.fecha}</div>
        ${p.descripcion ? `<div class="prop-desc">${p.descripcion}</div>` : ''}
        <div class="prop-footer">
          <span></span>
          <span class="ver-link">Ver propuesta →</span>
        </div>
      </a>
    `).join('');
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.filter);
    });
  });

  init();
</script>
</body>
</html>
